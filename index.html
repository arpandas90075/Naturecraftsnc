    <meta name="description" content="NatureCrafts — handmade soaps, devoted to nature. Crafted in small batches with botanical ingredients." />
    <title>NatureCrafts · Handmade Soaps</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Scrub any service worker / cache left by a previous deployment on this
      // domain — stale SWs are a classic cause of broken navigation.
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .getRegistrations()
          .then((rs) => rs.forEach((r) => r.unregister()))
          .catch(() => {});
        if (window.caches) {
          caches.keys().then((ks) => ks.forEach((k) => caches.delete(k))).catch(() => {});
        }
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
